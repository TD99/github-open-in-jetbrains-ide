name: Lint, Validate, Build & Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3). Leave empty to auto-detect."
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Determine version and push tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # GitVersion needs full history

      - name: Setup GitVersion
        if: inputs.version == ''
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: "6.x"

      - name: Execute GitVersion
        if: inputs.version == ''
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Set version output
        id: set-version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            INPUT="${{ inputs.version }}"
            echo "version=${INPUT#v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ steps.gitversion.outputs.majorMinorPatch }}" >> $GITHUB_OUTPUT
          fi

      - name: Push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.set-version.outputs.version }}"
          git push origin "v${{ steps.set-version.outputs.version }}"

  build:
    name: Lint, Validate, Build ZIP
    runs-on: ubuntu-latest
    needs: prepare
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Lint JavaScript
        run: |
          npm install -g eslint
          eslint . --ext .js

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ needs.prepare.outputs.version }}" ]; then
            echo "name=v${{ needs.prepare.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Inject version
        run: |
          VERSION="${{ steps.tag.outputs.name }}"
          VERSION="${VERSION#v}"
          echo "Injecting version: $VERSION"
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Validate Manifest
        run: |
          sudo apt-get install -y python3-pip
          pip install check-jsonschema
          SCHEMA_URL="https://json.schemastore.org/chrome-manifest.json"
          echo "Downloading Chrome manifest schema from: $SCHEMA_URL"
          curl -sSL "$SCHEMA_URL" -o schema.json
          echo "Removing UTF-8 BOM if present..."
          sed -i '1s/^\xEF\xBB\xBF//' manifest.json
          echo "Validating manifest.json..."
          check-jsonschema --schemafile schema.json manifest.json

      - name: Build ZIP
        run: |
          TAG_NAME="${{ steps.tag.outputs.name }}"
          mkdir -p dist
          ZIP_NAME="github-open-in-jetbrains-ide-extension-${TAG_NAME}.zip"
          echo "Building ZIP: $ZIP_NAME"
          zip -r "dist/$ZIP_NAME" . \
            -x "schema.json" \
               "eslint.config.js" \
               ".prettierrc" \
               "*.git*" \
               ".git/*" \
               ".github/*" \
               ".idea/*" \
               ".vscode/*" \
               ".design/*" \
               "node_modules/*" \
               "dist/*"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: dist

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: always() && needs.build.result == 'success'
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v5
        with:
          name: extension-zip
          path: dist

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ needs.prepare.outputs.version }}" ]; then
            echo "name=v${{ needs.prepare.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: dist/github-open-in-jetbrains-ide-extension-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
